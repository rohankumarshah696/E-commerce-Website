<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container" class="login">
    <div class="inputs log" id="">Login</div>
    <input class="inputs" id="username" type="text" name="username" placeholder="Enter Username">
    <div id="passwordshow">
    <input class="inputs" id="password" type="password" placeholder="Enter Password">
    <i class="fa-solid fa-eye eyes" id="hide"></i>
    <i class="fa-solid fa-eye-slash eyes" id="show"></i>
    </div>
    <button class="inputs">Log in</button>

<div class="" id="forgot"><p class="forgotpass">Forgot Password</p><p class="signup">Sign up</p></div>
    </div>
    <script src="login.js"></script>
</body>
</html>
